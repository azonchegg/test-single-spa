<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>single-spa root</title>

  <!-- SystemJS loader -->
  <script src="https://cdn.jsdelivr.net/npm/systemjs/dist/system.min.js"></script>

  <!-- Import map: здесь “вставляется” ваш entry (через URL) -->
  <script type="systemjs-importmap">
    {
      "imports": {
        "@org/root-config": "http://localhost:9000/dist/root-config.js",
        "@org/my-mfe": "http://localhost:8080/dist/spa.js",
        "single-spa": "https://cdn.jsdelivr.net/npm/single-spa/lib/system/single-spa.min.js"
      }
    }
  </script>
</head>

<body>
<!-- Контейнер(ы) под ваши приложения -->
<div id="single-spa-application:@org/my-mfe"></div>

<!-- Стартуем root-config -->
<script>
  System.import("@org/root-config");
</script>
</body>
</html>
